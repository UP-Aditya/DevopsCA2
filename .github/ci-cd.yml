name: DevOps CA2 Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Run App Test
      run: |
        node index.js &
        sleep 5
        curl http://localhost:3000/health

    - name: Build Docker Image
      run: docker build -t devopca2 .

    - name: Run Container
      run: docker run -d -p 3000:3000 devopca2