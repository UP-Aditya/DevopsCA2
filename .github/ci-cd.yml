name: devops_ca2 CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Start Server
        run: |
          node index.js &
          sleep 10

      - name: Test API
        run: curl http://localhost:3000/health

      - name: Build Docker Image
        run: docker build -t devopca2 .
